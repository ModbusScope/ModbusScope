name: Build

# Triggered when code is pushed to any branch in a repository
on: push

jobs:
  linux:
    runs-on: ubuntu-latest

    container:
      image: docker://jgeudens/qt-linux:6.8.3_build_1
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Start display server
        run: bash /start.sh &

      - name: Configure safe directory for git
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Update Modules and Build
        run: bash scripts/build_linux.sh

      - name: Deploy
        run: bash scripts/deploy_linux.sh

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: modbusscope-linux
          path: ModbusScope*.AppImage

  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6.0.0

      - name: Install Qt installer
        run: pip3 install aqtinstall==3.3.0

      # Cache go build cache, used to speedup go test
      - name: Qt Build Cache
        uses: actions/cache@v5.0.0
        id: cache
        with:
          path: ${{ github.workspace }}\Qt
          key: ${{ runner.os }}-qt-build-${{ hashFiles('scripts\setup_windows.bat') }}

      - name: Setup, build and deploy
        shell: cmd
        run: scripts\full_build_and_deploy_windows.bat '${{ steps.cache.outputs.cache-hit }}' ${{ github.workspace }}\Qt

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: modbusscope-windows
          path: |
            ModbusScope.zip
            ModbusScope_setup.exe

  docs:
    runs-on: ubuntu-latest

    container:
      image: docker://jgeudens/doc-latex:20250124_build_1
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Build doc
        run: |
          sh create_doc.sh
          mv docs/manual/_build/latex/modbusscope.pdf modbusscope-user-manual.pdf

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: modbusscope-user-manual
          path: modbusscope-user-manual.pdf

  package:
    runs-on: ubuntu-latest
    needs: [linux, windows, docs]

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: modbusscope-linux
          path: all-artifacts/linux

      - uses: actions/download-artifact@v8.0.1
        with:
          name: modbusscope-windows
          path: all-artifacts/windows

      - uses: actions/download-artifact@v8
        with:
          name: modbusscope-user-manual
          path: all-artifacts/docs

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: modbusscope-all-platforms
          path: all-artifacts/
